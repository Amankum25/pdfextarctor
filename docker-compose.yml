version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: policy_analyzer_backend
    ports:
      - "8000:8000"
    volumes:
      # Mount the faiss_index directory to persist the vector database
      - ./backend/faiss_index:/app/faiss_index
    environment:
      # Embedding configuration
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-local}
      - LOCAL_EMBEDDING_MODEL=${LOCAL_EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      
      # LLM configuration
      - LLM_PROVIDER=${LLM_PROVIDER:-groq}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-llama-3.3-70b-versatile}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      
      # Ollama configuration (if using)
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      
      # Chunking configuration
      - CHUNK_SIZE=${CHUNK_SIZE:-1000}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-200}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: policy_analyzer_frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Development service for backend only
  backend-dev:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: policy_analyzer_backend_dev
    ports:
      - "8001:8000"
    volumes:
      # Mount source code for live reload
      - ./backend:/app
      - ./backend/faiss_index:/app/faiss_index
    environment:
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-local}
      - LOCAL_EMBEDDING_MODEL=${LOCAL_EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-groq}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-llama-3.3-70b-versatile}
      - GROQ_API_KEY=${GROQ_API_KEY}
    env_file:
      - .env
    profiles:
      - dev
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload