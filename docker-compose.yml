version: '3.8'

services:
  pdfextractor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdf_qa_system
    ports:
      - "8501:8501"
    volumes:
      # Mount the faiss_index directory to persist the vector database
      - ./faiss_index:/app/faiss_index
      # Mount uploads directory if you want to persist uploaded files
      - ./uploads:/app/uploads
    environment:
      # Set your Google API key here or use .env file
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    env_file:
      - .env  # Optional: Load environment variables from .env file
    restart: unless-stopped
    stdin_open: true
    tty: true

  # Optional: Add a development service for live code reloading
  pdfextractor-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdf_qa_system_dev
    ports:
      - "8502:8501"
    volumes:
      # Mount source code for development
      - .:/app
      - ./faiss_index:/app/faiss_index
      - ./uploads:/app/uploads
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    env_file:
      - .env
    profiles:
      - dev  # Only start with --profile dev
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0 --server.runOnSave=true