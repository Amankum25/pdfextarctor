services:
  - type: web
    name: pdfextractor-backend
    runtime: python
    plan: free
    pythonVersion: "3.11.9"
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT --log-level info
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: EMBEDDING_PROVIDER
        value: local
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL_NAME
        value: llama-3.3-70b-versatile
